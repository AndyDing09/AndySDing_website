document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

) 46%, rgba(10,10,18,.15) 100%);\"><\u002Fdiv>\n  <div data-r=\"pad\" style=\"position: relative; pointer-events: none; max-width: 1060px; margin: 0 auto; padding: 130px 28px 60px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end;\">\n    <a href=\"index.html#research\" style=\"pointer-events: auto; display: inline-flex; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .12em; color: #8d8399; width: fit-content;\" style-hover=\"color: #fff;\">← ALL RESEARCH<\u002Fa>\n    <div style=\"display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 22px; animation: omFadeUp .8s ease both;\">\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .12em; padding: 4px 10px; border-radius: 999px; background: rgba(255,180,84,.12); color: #ffd39b; border: 1px solid rgba(255,180,84,.3);\">ACTIVE · SUMMER 2026 – 2027<\u002Fspan>\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .12em; color: #8d8399;\">MEDICAL IMAGING INTERNSHIP · LEAD INVESTIGATOR<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"margin: 18px 0 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(46px, 7vw, 96px); line-height: 1; animation: omFadeUp .8s .1s ease both;\">Lumina<em style=\"color: #ffb454; font-style: italic;\">Bone<\u002Fem><\u002Fh1>\n    <p style=\"margin: 20px 0 0; max-width: 560px; font-size: 17px; line-height: 1.65; color: #cfc5da; animation: omFadeUp .8s .2s ease both;\">A 6&nbsp;mm endoscope that rebuilds bone in 3-D from moving light — near-light photometric stereo turning shading into surgical depth, with no dye and no stereo cameras.<\u002Fp>\n    <div style=\"display: flex; gap: 24px; margin-top: 30px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #8d8399; flex-wrap: wrap; animation: omFadeUp .8s .3s ease both;\">\n      <span><strong style=\"color: #ede9f2;\">2×<\u002Fstrong> off-axis micro-LEDs<\u002Fspan>\n      <span><strong style=\"color: #ede9f2;\">≥15 fps<\u002Fstrong> target<\u002Fspan>\n      <span><strong style=\"color: #ede9f2;\">17<\u002Fstrong> bone sites reconstructed<\u002Fspan>\n      <span ref=\"{{ lumaReadoutRef }}\" style=\"color: #ffb454;\">LIGHT θ 0°<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"margin-top: 26px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .2em; color: #6b6178; animation: omFadeUp .8s .4s ease both;\">MOVE YOUR CURSOR — YOU ARE THE LED<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- STATUS -->\n<section data-screen-label=\"Status\" data-r=\"pad\" style=\"max-width: 1060px; margin: 0 auto; padding: 60px 28px 20px;\">\n  <div style=\"border: 1px solid rgba(255,180,84,.3); border-radius: 6px; background: rgba(255,180,84,.05); padding: 22px 26px; font-size: 15px; line-height: 1.7; color: #d8cbb2;\">\n    <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .16em; color: #ffb454;\">BENCH STATUS · JUL 2026&nbsp;&nbsp;<\u002Fspan>\n    The reconstruction pipeline runs <strong style=\"color: #ffd39b;\">end-to-end<\u002Fstrong>: 17 locations on real bone models imaged under a multi-LED rig and rebuilt into per-location depth maps (≈2.5&nbsp;mm relative relief). Now: registering point clouds to a ground-truth 3-D bone model and pushing toward real-time.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROBLEM + APPROACH -->\n<section data-screen-label=\"Approach\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 70px 28px 20px;\">\n  <div data-r=\"split\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: start;\">\n    <div>\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: #ffb454;\">01 / THE PROBLEM<\u002Fspan>\n      <h2 style=\"margin: 12px 0 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(32px, 4vw, 46px); line-height: 1.1;\">Surgeons see bone <em style=\"color: #ffb454;\">flat<\u002Fem><\u002Fh2>\n      <p style=\"margin: 18px 0 0; color: #cfc5da; line-height: 1.7; font-size: 15.5px;\">Through an endoscope, curved bone reads as a 2-D picture. How much bone has been removed, how a drill path is progressing, where a ridge ends — that's experience and indirect cues. Existing 3-D answers need fluorescent dye, structured-light projectors, or stereo camera pairs too bulky and expensive for a millimeter-scale tube.<\u002Fp>\n      <p style=\"margin: 14px 0 0; color: #a99dbb; line-height: 1.7; font-size: 15px;\">The goal: real-time, quantitative 3-D bone topography from <strong style=\"color: #ede9f2;\">one small camera and cheap LEDs<\u002Fstrong> — hardware simple enough for a 6 mm tip, cheap enough to be disposable.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border: 1px solid rgba(255,180,84,.2); border-radius: 6px; background: rgba(20,16,28,.6); padding: 24px 26px;\">\n      <div style=\"display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .18em; color: #6b6178; margin-bottom: 14px;\">\n        <span>ENDOSCOPE TIP — FIRING SEQUENCE<\u002Fspan><span>{{ frameLabel }}<\u002Fspan>\n      <\u002Fdiv>\n      <svg sc-camel-view-box=\"0 0 380 200\" style=\"width: 100%; height: auto; display: block;\">\n        <circle cx=\"190\" cy=\"100\" r=\"86\" fill=\"rgba(237,233,242,.03)\" stroke=\"rgba(237,233,242,.25)\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"190\" cy=\"100\" r=\"86\" fill=\"none\" stroke=\"rgba(255,180,84,.15)\" stroke-width=\"1\" stroke-dasharray=\"2 5\"><\u002Fcircle>\n        <text x=\"190\" y=\"30\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" fill=\"#6b6178\">6 MM OUTER DIAMETER<\u002Ftext>\n        <circle cx=\"190\" cy=\"105\" r=\"30\" fill=\"rgba(10,10,18,.9)\" stroke=\"rgba(237,233,242,.4)\" stroke-width=\"1.4\"><\u002Fcircle>\n        <circle cx=\"190\" cy=\"105\" r=\"19\" fill=\"rgba(120,140,255,.08)\" stroke=\"rgba(237,233,242,.25)\" stroke-width=\"1\"><\u002Fcircle>\n        <text x=\"190\" y=\"109\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"8.5\" fill=\"#b3a9c2\">CAMERA<\u002Ftext>\n        <circle cx=\"120\" cy=\"88\" r=\"13\" fill=\"{{ ledLfill }}\" stroke=\"{{ ledLstroke }}\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"120\" cy=\"88\" r=\"{{ ledLhalo }}\" fill=\"none\" stroke=\"rgba(255,180,84,.35)\" stroke-width=\"1\"><\u002Fcircle>\n        <text x=\"120\" y=\"92\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"8.5\" fill=\"#0a0a12\" font-weight=\"700\">L1<\u002Ftext>\n        <circle cx=\"260\" cy=\"122\" r=\"13\" fill=\"{{ ledRfill }}\" stroke=\"{{ ledRstroke }}\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"260\" cy=\"122\" r=\"{{ ledRhalo }}\" fill=\"none\" stroke=\"rgba(255,180,84,.35)\" stroke-width=\"1\"><\u002Fcircle>\n        <text x=\"260\" y=\"126\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"8.5\" fill=\"#0a0a12\" font-weight=\"700\">L2<\u002Ftext>\n        <text x=\"120\" y=\"66\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" fill=\"#8d8399\">OFF-AXIS LED<\u002Ftext>\n        <text x=\"260\" y=\"150\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" fill=\"#8d8399\">OFF-AXIS LED<\u002Ftext>\n        <text x=\"190\" y=\"185\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" fill=\"#8d8399\">PWM-DRIVEN · FRAME-SYNCHRONIZED · ALTERNATING<\u002Ftext>\n      <\u002Fsvg>\n      <div style=\"margin-top: 14px; font-size: 13px; line-height: 1.65; color: #a99dbb;\">Two lights instead of two cameras: alternating frames lit from known positions encode surface slope in their shading. A Lambertian model with inverse-square near-light correction solves per-pixel normals; integration turns normals into a live height map.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RESULTS -->\n<section data-screen-label=\"Results\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 80px 28px 20px;\">\n  <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: #ffb454;\">02 / BENCH RESULTS<\u002Fspan>\n  <h2 style=\"margin: 12px 0 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(32px, 4vw, 46px);\">17 surfaces, <em style=\"color: #ffb454;\">rebuilt<\u002Fem><\u002Fh2>\n  <p style=\"margin: 16px 0 28px; max-width: 680px; color: #a99dbb; line-height: 1.7; font-size: 15px;\">Each location: one uniform reference frame plus three single-LED frames (right, top, left). Woodham photometric stereo recovers per-pixel normals; a Frankot–Chellappa FFT integrator turns them into depth.<\u002Fp>\n  <div data-r=\"split\" style=\"display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; align-items: start;\">\n    <figure style=\"margin: 0; border: 1px solid rgba(255,180,84,.2); border-radius: 6px; overflow: hidden; background: #14101c;\">\n      <img src=\"a7904ca5-5ca2-4fd2-a30a-2e9152a8f978\" alt=\"Grid of 17 bone locations: endoscope photo beside recovered depth heatmap\" style=\"width: 100%; display: block;\">\n      <figcaption style=\"padding: 12px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8d8399; line-height: 1.6;\">PHOTO vs RECOVERED DEPTH — ALL 17 LOCATIONS · BLUE = NEAR, RED = FAR<\u002Ffigcaption>\n    <\u002Ffigure>\n    <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n      <figure style=\"margin: 0; border: 1px solid rgba(255,180,84,.2); border-radius: 6px; overflow: hidden; background: #14101c;\">\n        <img src=\"37d91c10-15a1-40a2-8fee-6d5ce61b4bcd\" alt=\"Single bone sample under the multi-LED rig\" style=\"width: 100%; display: block;\">\n        <figcaption style=\"padding: 12px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8d8399;\">SAMPLE UNDER THE MULTI-LED RIG<\u002Ffigcaption>\n      <\u002Ffigure>\n      <div style=\"border: 1px solid rgba(255,180,84,.2); border-radius: 6px; padding: 18px 20px; background: rgba(20,16,28,.6);\">\n        <div style=\"display: flex; gap: 22px; flex-wrap: wrap;\">\n          <div><div style=\"font-family: 'Instrument Serif', serif; font-size: 34px; color: #ffd39b;\">≈2.5 mm<\u002Fdiv><div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .12em; color: #8d8399;\">MEAN SURFACE RELIEF<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-family: 'Instrument Serif', serif; font-size: 34px; color: #ffd39b;\">2.0–3.0<\u002Fdiv><div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .12em; color: #8d8399;\">RANGE, MM<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top: 12px; font-size: 12.5px; line-height: 1.6; color: #a99dbb;\">Relative depths (shape up to offset + scale) under a 30 mm FoV assumption — absolute millimeters await coaxial-light calibration.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SPECS -->\n<section data-screen-label=\"Specs\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 80px 28px 20px;\">\n  <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: #ffb454;\">03 / THE INSTRUMENT<\u002Fspan>\n  <h2 style=\"margin: 12px 0 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(32px, 4vw, 46px);\">Technical <em style=\"color: #ffb454;\">manifest<\u002Fem><\u002Fh2>\n  <div data-r=\"duo\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 28px;\">\n    <sc-for list=\"{{ specs }}\" as=\"sp\" hint-placeholder-count=\"7\">\n      <div style=\"border: 1px solid rgba(255,180,84,.16); border-radius: 4px; background: rgba(20,16,28,.5); padding: 15px 18px; display: flex; gap: 16px; align-items: baseline;\" style-hover=\"border-color: rgba(255,180,84,.5); background: rgba(255,180,84,.05);\">\n        <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .12em; color: #8d8399; min-width: 118px; text-transform: uppercase;\">{{ sp.k }}<\u002Fspan>\n        <span style=\"font-size: 13.5px; color: #e3dcec; line-height: 1.55;\">{{ sp.v }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TIMELINE -->\n<section data-screen-label=\"Timeline\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 80px 28px 20px;\">\n  <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: #ffb454;\">04 / LAB LOG<\u002Fspan>\n  <h2 style=\"margin: 12px 0 28px; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(32px, 4vw, 46px);\">From proposal to <em style=\"color: #ffb454;\">point cloud<\u002Fem><\u002Fh2>\n  <div>\n    <sc-for list=\"{{ timeline }}\" as=\"t\" hint-placeholder-count=\"6\">\n      <div style=\"border-left: 2px solid rgba(255,180,84,.35); padding: 4px 0 26px 22px; position: relative;\" style-hover=\"border-color: #ffb454; background: rgba(255,180,84,.04);\">\n        <span style=\"position: absolute; left: -6px; top: 8px; width: 10px; height: 10px; border-radius: 50%; background: {{ t.dot }};\"><\u002Fspan>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #b3a9c2; letter-spacing: .1em;\">{{ t.date }}<\u002Fdiv>\n        <div style=\"margin-top: 6px; font-size: 17px; font-weight: 600;\">{{ t.title }}<\u002Fdiv>\n        <div style=\"margin-top: 6px; font-size: 14px; color: #a99dbb; line-height: 1.6; max-width: 640px;\">{{ t.desc }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DOCS -->\n<section data-screen-label=\"Documents\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 80px 28px 100px;\">\n  <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: #ffb454;\">05 / FILM ARCHIVE<\u002Fspan>\n  <h2 style=\"margin: 12px 0 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(32px, 4vw, 46px);\">Working <em style=\"color: #ffb454;\">documents<\u002Fem><\u002Fh2>\n  <p style=\"margin: 14px 0 30px; color: #a99dbb; max-width: 620px; line-height: 1.65; font-size: 15px;\">Proposal, method notes, protocols, and results — the project as it actually developed, not a polished summary.<\u002Fp>\n  <div data-r=\"duo\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n    <sc-for list=\"{{ docs }}\" as=\"d\" hint-placeholder-count=\"9\">\n      <a href=\"{{ d.href }}\" target=\"_blank\" rel=\"noopener\" style=\"display: block; border: 1px dashed rgba(255,180,84,.3); border-radius: 6px; padding: 18px 20px; color: inherit;\" style-hover=\"border-color: #ffb454; background: rgba(255,180,84,.05); transform: translateY(-3px); color: inherit;\">\n        <div style=\"display: flex; justify-content: space-between; gap: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .16em;\"><span style=\"color: #ffb454;\">{{ d.kind }}<\u002Fspan><span style=\"color: #6b6178;\">{{ d.date }}<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top: 8px; font-size: 15.5px; color: #ede9f2; font-weight: 600;\">{{ d.title }}<\u002Fdiv>\n        <div style=\"margin-top: 6px; font-size: 13px; color: #a99dbb; line-height: 1.55;\">{{ d.desc }}<\u002Fdiv>\n      <\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer data-screen-label=\"Footer\" style=\"border-top: 1px solid rgba(255,180,84,.14);\">\n  <div data-r=\"pad\" style=\"max-width: 1060px; margin: 0 auto; padding: 50px 28px; display: flex; justify-content: space-between; align-items: center; gap: 18px; flex-wrap: wrap;\">\n    <div style=\"font-family: 'Instrument Serif', serif; font-size: 26px;\">Next port: <em style=\"color: #35e0c8;\">Kymarion<\u002Fem><\u002Fdiv>\n    <div style=\"display: flex; gap: 10px;\">\n      <a href=\"kymarion.html\" style=\"padding: 10px 16px; border: 1px solid rgba(53,224,200,.35); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #7fe8d8;\" style-hover=\"border-color: #35e0c8; background: rgba(53,224,200,.1); color: #fff;\">KYMARION →<\u002Fa>\n      <a href=\"index.html#research\" style=\"padding: 10px 16px; border: 1px solid rgba(255,180,84,.3); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #ffd39b;\" style-hover=\"border-color: #ffb454; background: rgba(255,180,84,.08); color: #fff;\">ALL RESEARCH<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { led: 0, frame: 0 };\n  lumaCanvasRef = React.createRef();\n  lumaReadoutRef = React.createRef();\n\n  renderVals() {\n    const l = this.state.led;\n    return {\n      lumaCanvasRef: this.lumaCanvasRef, lumaReadoutRef: this.lumaReadoutRef,\n      frameLabel: 'FRAME ' + String(this.state.frame).padStart(3, '0') + ' · ' + (l === 0 ? 'L1 LIT' : 'L2 LIT'),\n      ledLfill: l === 0 ? '#ffb454' : 'rgba(255,180,84,.15)',\n      ledLstroke: l === 0 ? '#ffd39b' : 'rgba(255,180,84,.3)',\n      ledLhalo: l === 0 ? 22 : 0,\n      ledRfill: l === 1 ? '#ffb454' : 'rgba(255,180,84,.15)',\n      ledRstroke: l === 1 ? '#ffd39b' : 'rgba(255,180,84,.3)',\n      ledRhalo: l === 1 ? 22 : 0,\n      specs: [\n        { k: 'Form factor', v: '6 mm outer-diameter endoscope tip' },\n        { k: 'Illumination', v: '2× off-axis micro-LEDs, sequentially PWM-driven, frame-synchronized' },\n        { k: 'Reconstruction', v: 'Near-light photometric stereo — Lambertian model + inverse-square falloff correction' },\n        { k: 'Pipeline', v: 'Per-pixel normal solve → Frankot–Chellappa FFT integration → 3-D height map' },\n        { k: 'Performance', v: '≥ 15 fps real-time reconstruction target' },\n        { k: 'Validation', v: 'Bone phantoms, ground-truthed against high-precision laser scans' },\n        { k: 'Applications', v: 'Orthopedic & ENT surgery — depth feedback during bone removal and drilling' },\n        { k: 'Stack', v: 'Python · OpenCV · NumPy · PWM LED driving · micro-optics' },\n      ],\n      timeline: [\n        { date: 'APR–MAY 2026', title: 'Proposal & background', desc: 'Literature review of near-light photometric stereo in endoscopy; proposal scoped for an 8–12 week build.', dot: '#ffb454' },\n        { date: 'MAY 2026', title: 'Reconstruction pipeline', desc: 'Woodham solver + Poisson depth integration working on synthetic and sample images; code on GitHub. Application scoped to ~2–3 mm surgical guidance.', dot: 'rgba(255,180,84,.75)' },\n        { date: 'MAY 2026', title: 'Clinical extensions scoped', desc: 'Two protocols drafted — uniportal spine-endoscopy depth assessment, and CavityScan for pre-implant cavity mapping.', dot: 'rgba(255,180,84,.6)' },\n        { date: 'JUN 2026', title: 'Multi-LED rig & bench capture', desc: '17-location bone dataset captured and reconstructed into per-location depth maps.', dot: 'rgba(255,180,84,.5)' },\n        { date: 'JUL 2026 →', title: 'Registration & real-time', desc: 'Registering recovered point clouds to a ground-truth bone model; optimizing toward ≥15 fps.', dot: '#35e0c8' },\n        { date: 'AHEAD', title: 'Accuracy validation & write-up', desc: 'Quantitative accuracy vs laser/CT ground truth, coaxial-light absolute-scale calibration, technical paper.', dot: 'rgba(255,180,84,.35)' },\n      ],\n      docs: [\n        { kind: 'PROPOSAL', date: 'APR–MAY 2026', title: 'Project Proposal', desc: 'The full proposal: dual-LED tip, the photometric pipeline, hardware plan, phantom validation.', href: 'https://andysding.com/docs/luminabone-proposal.html' },\n        { kind: 'PRESENTATION', date: 'MAY 2026', title: 'Intro Deck', desc: 'The pitch: the approach, deliverables, and where it sits against other depth-sensing methods.', href: 'https://andysding.com/docs/luminabone-intro-deck.html' },\n        { kind: 'TECHNICAL NOTES', date: 'MAY 2026', title: 'Photometric Stereo Reconstruction', desc: 'The physics worked in full: Lambertian reflectance, falloff, the Woodham solve, integration.', href: 'https://andysding.com/docs/luminabone-photometric-stereo.html' },\n        { kind: 'RESULTS', date: 'JUN 2026', title: 'Bench Results — 17-Sample Study', desc: 'Per-location reconstructions with the full estimates table and the relative-depth caveat.', href: 'https://andysding.com/docs/luminabone-bench-results.html' },\n        { kind: 'LAB NOTEBOOK', date: 'MAY–JUL 2026', title: 'Development Log', desc: 'Dated running log of decisions and open questions — first algorithm to point-cloud registration.', href: 'https://andysding.com/docs/luminabone-development-log.html' },\n        { kind: 'PROTOCOL', date: 'JUN 2026', title: 'Data Collection Protocol', desc: 'The black-box capture rig: four-camera holder, sequential LEDs, spine sawbone ground truth.', href: 'https://andysding.com/docs/luminabone-data-collection-protocol.html' },\n        { kind: 'DESIGN STUDY', date: 'MAY 2026', title: 'Presenting Depth to the Surgeon', desc: 'Four ways to show depth intra-operatively — and when each one helps.', href: 'https://andysding.com/docs/luminabone-depth-display-ux.html' },\n        { kind: 'ASSESSMENT', date: 'MAY 2026', title: 'Depth Tech for Uniportal Spine Endoscopy', desc: 'LB-RPT-002: why the working channel rules out stereo, structured light, and ToF.', href: 'https://andysding.com/docs/luminabone-spine-depth-assessment.html' },\n        { kind: 'PROTOCOL', date: 'MAY 2026', title: 'CavityScan — Pre-Implant Mapping', desc: 'LB-EXT-001: map a reamed cavity and predict implant-bone contact before committing.', href: 'https://andysding.com/docs/luminabone-cavityscan-protocol.html' },\n      ],\n    };\n  }\n\n  componentDidMount() {\n    this.reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.initLuma();\n    this.initReveal();\n    this.ledTimer = setInterval(() => {\n      if (!document.hidden && !this.reduced) this.setState(s => ({ led: 1 - s.led, frame: (s.frame + 1) % 1000 }));\n    }, 900);\n    this.onResize = () => this.drawLumaFrame();\n    window.addEventListener('resize', this.onResize);\n  }\n\n  // near-light photometric shading over a bone-like height field\n  initLuma() {\n    const c = this.lumaCanvasRef.current; if (!c) return;\n    const W = 240, H = 150;\n    c.width = W; c.height = H;\n    const Hf = new Float32Array(W * H);\n    const bump = (cx, cy, s, a) => {\n      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {\n        const dx = (x - cx) / s, dy = (y - cy) / s;\n        Hf[y * W + x] += a * Math.exp(-(dx * dx + dy * dy));\n      }\n    };\n    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {\n      const dy = (y - H * 0.55) / (H * 0.2);\n      Hf[y * W + x] = 15 * Math.exp(-dy * dy) * (0.7 + 0.3 * Math.sin(x * 0.04 + Math.sin(y * .06)));\n    }\n    bump(46, 58, 20, 14); bump(38, 100, 16, 11); bump(200, 62, 18, 13); bump(206, 104, 15, 10);\n    bump(104, 78, 11, -5); bump(150, 90, 9, 4); bump(126, 62, 7, -3);\n    const Nx = new Float32Array(W * H), Ny = new Float32Array(W * H), Nz = new Float32Array(W * H);\n    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {\n      const i = y * W + x;\n      const hl = Hf[y * W + Math.max(0, x - 1)], hr = Hf[y * W + Math.min(W - 1, x + 1)];\n      const hu = Hf[Math.max(0, y - 1) * W + x], hd = Hf[Math.min(H - 1, y + 1) * W + x];\n      let nx = (hl - hr), ny = (hu - hd), nz = 2.4;\n      const l = Math.sqrt(nx * nx + ny * ny + nz * nz);\n      Nx[i] = nx / l; Ny[i] = ny / l; Nz[i] = nz / l;\n    }\n    this.luma = { c, W, H, Hf, Nx, Ny, Nz, lx: W * .3, ly: H * .3, idle: true, t: 0, img: c.getContext('2d').createImageData(W, H) };\n    c.addEventListener('pointermove', (e) => {\n      const r = c.getBoundingClientRect();\n      this.luma.lx = (e.clientX - r.left) / r.width * W;\n      this.luma.ly = (e.clientY - r.top) / r.height * H;\n      this.luma.idle = false;\n      this.queueLuma();\n    });\n    c.addEventListener('pointerleave', () => { this.luma.idle = true; });\n    const idleLoop = () => {\n      this.raf = requestAnimationFrame(idleLoop);\n      if (this.luma.idle && !this.reduced) {\n        this.luma.t += 0.01;\n        this.luma.lx = W / 2 + Math.cos(this.luma.t) * W * 0.38;\n        this.luma.ly = H / 2 + Math.sin(this.luma.t * 1.3) * H * 0.32;\n        this.drawLumaFrame();\n      }\n    };\n    idleLoop();\n    this.drawLumaFrame();\n  }\n  queueLuma() {\n    if (this.q) return; this.q = true;\n    requestAnimationFrame(() => { this.q = false; this.drawLumaFrame(); });\n  }\n  drawLumaFrame() {\n    const L = this.luma; if (!L) return;\n    const { W, H, Hf, Nx, Ny, Nz, img, c } = L;\n    const lz = 36, d = img.data;\n    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {\n      const i = y * W + x;\n      let dx = L.lx - x, dy = L.ly - y, dz = lz - Hf[i];\n      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;\n      dx /= dist; dy /= dist; dz /= dist;\n      const lam = Math.max(0, Nx[i] * dx + Ny[i] * dy + Nz[i] * dz);\n      const fall = 3300 / (dist * dist);\n      const v = lam * fall;\n      const spec = Math.pow(lam, 24) * fall * 0.5;\n      const mask = Math.min(1, Hf[i] / 5);\n      const o = i * 4;\n      d[o]     = Math.min(255, (v * 232 + spec * 255) * mask + 8);\n      d[o + 1] = Math.min(255, (v * 196 + spec * 245) * mask + 7);\n      d[o + 2] = Math.min(255, (v * 150 + spec * 225) * mask + 12);\n      d[o + 3] = 255;\n    }\n    const ctx = c.getContext('2d');\n    ctx.putImageData(img, 0, 0);\n    ctx.beginPath(); ctx.arc(L.lx, L.ly, 2.6, 0, Math.PI * 2);\n    ctx.fillStyle = '#ffd39b'; ctx.fill();\n    ctx.beginPath(); ctx.arc(L.lx, L.ly, 6, 0, Math.PI * 2);\n    ctx.strokeStyle = 'rgba(255,211,155,.6)'; ctx.lineWidth = .8; ctx.stroke();\n    if (this.lumaReadoutRef.current) {\n      const th = Math.round(Math.atan2(L.ly - H / 2, L.lx - W / 2) * 180 / Math.PI);\n      this.lumaReadoutRef.current.textContent = 'LIGHT θ ' + th + '°';\n    }\n  }\n\n  initReveal() {\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    if (this.reduced || !('IntersectionObserver' in window)) return;\n    els.forEach(el => {\n      if (el.getBoundingClientRect().top > window.innerHeight * 0.9) {\n        el.style.opacity = '0'; el.style.transform = 'translateY(26px)';\n        el.style.transition = 'opacity .7s ease, transform .7s ease';\n      }\n    });\n    this.io = new IntersectionObserver((es) => {\n      for (const en of es) if (en.isIntersecting) {\n        en.target.style.opacity = '1'; en.target.style.transform = 'none';\n        this.io.unobserve(en.target);\n      }\n    }, { threshold: 0.08 });\n    els.forEach(el => this.io.observe(el));\n    setTimeout(() => els.forEach(el => { el.style.opacity = '1'; el.style.transform = 'none'; }), 5000);\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this.raf);\n    clearInterval(this.ledTimer);\n    if (this.io) this.io.disconnect();\n    window.removeEventListener('resize', this.onResize);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
