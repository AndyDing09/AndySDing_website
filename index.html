document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: var(--acc,#35e0c8); color: #04121a; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: .06em; border-radius: 3px;\" style-hover=\"transform: translateY(-2px); box-shadow: 0 8px 28px rgba(53,224,200,.35); color: #04121a;\">EXPLORE THE RESEARCH ↓<\u002Fa>\n      <a href=\"https://andysding.com/resume.pdf\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-flex; align-items: center; gap: 10px; padding: 14px 24px; border: 1px solid rgba(127,232,216,.35); color: #cfe6e4; font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: .06em; border-radius: 3px;\" style-hover=\"border-color: var(--acc,#35e0c8); color: #ffffff; background: rgba(53,224,200,.07);\">RÉSUMÉ&nbsp;PDF<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 26px; margin-top: 54px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #7fa8ae; flex-wrap: wrap; animation: omFadeUp .8s .48s ease both;\">\n      <span><strong style=\"color: #e8f1f2;\">ASV<\u002Fstrong>&nbsp;autonomous surface vehicle<\u002Fspan>\n      <span><strong style=\"color: #e8f1f2;\">ISEF<\u002Fstrong>&nbsp;2026–27 target<\u002Fspan>\n      <span><strong style=\"color: #e8f1f2;\">FTC<\u002Fstrong>&nbsp;robotics captain<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .2em; color: #5c828a; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 6px;\">\n    <span>CLICK WATER TO PING<\u002Fspan>\n    <span style=\"animation: omBob 2s infinite ease-in-out;\">▼<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ══ MARQUEE ══ -->\n<div style=\"border-top: 1px solid rgba(255,180,84,.25); border-bottom: 1px solid rgba(255,180,84,.25); background: rgba(255,180,84,.05); overflow: hidden; padding: 10px 0;\">\n  <div style=\"display: flex; width: max-content; animation: omMarquee 30s linear infinite; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .18em; color: #ffb454; white-space: nowrap;\">\n    <span style=\"padding-right: 48px;\">42.36°N · 71.26°W ◆ 6 STATIONS · 3 MATCHED PAIRS ◆ TRACK: MASSACHUSETTS COAST ◆ TARGET ≥ 15 FPS BONE RECONSTRUCTION ◆ ISEF 2026–27 ◆ FTC TEAM 26413 ◆ SOUNDINGS IN METERS ◆<\u002Fspan>\n    <span style=\"padding-right: 48px;\">42.36°N · 71.26°W ◆ 6 STATIONS · 3 MATCHED PAIRS ◆ TRACK: MASSACHUSETTS COAST ◆ TARGET ≥ 15 FPS BONE RECONSTRUCTION ◆ ISEF 2026–27 ◆ FTC TEAM 26413 ◆ SOUNDINGS IN METERS ◆<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══ ABOUT ══ -->\n<section id=\"about\" data-screen-label=\"About\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 110px 28px 90px;\">\n  <div style=\"display: flex; align-items: baseline; gap: 16px; margin-bottom: 46px;\">\n    <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: var(--acc,#35e0c8);\">01 / PROFILE<\u002Fspan>\n    <h2 style=\"margin: 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(38px, 5vw, 60px);\">About <em style=\"color: var(--acc,#35e0c8);\">me<\u002Fem><\u002Fh2>\n  <\u002Fdiv>\n  <div data-r=\"split\" style=\"display: grid; grid-template-columns: 300px 1fr; gap: 54px; align-items: start;\">\n    <div style=\"display: flex; flex-direction: column; align-items: center; gap: 20px;\">\n      <div style=\"position: relative; width: 240px; height: 240px;\">\n        <span style=\"position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(53,224,200,.5); animation: omPing 3.2s ease-out infinite;\"><\u002Fspan>\n        <span style=\"position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(53,224,200,.3); animation: omPing 3.2s 1.1s ease-out infinite;\"><\u002Fspan>\n        <div style=\"position: absolute; inset: 10px; border-radius: 50%; overflow: hidden; border: 2px solid rgba(127,232,216,.4); background: #0a222d;\">\n          <img src=\"5e8df998-91c3-4363-9410-12545b652045\" alt=\"Andy Ding\" style=\"width: 100%; height: 100%; object-fit: cover; display: block;\">\n        <\u002Fdiv>\n        <svg style=\"position: absolute; inset: -14px; width: calc(100% + 28px); height: calc(100% + 28px); animation: omSweep 26s linear infinite;\" sc-camel-view-box=\"0 0 100 100\" fill=\"none\"><circle cx=\"50\" cy=\"50\" r=\"48.5\" stroke=\"rgba(127,232,216,.25)\" stroke-width=\".5\" stroke-dasharray=\"1 5\"><\u002Fcircle><circle cx=\"50\" cy=\"1.5\" r=\"1.6\" fill=\"#ffb454\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 10px;\">\n        <a href=\"https://github.com/andyding09\" target=\"_blank\" rel=\"noopener\" style=\"padding: 9px 14px; border: 1px solid rgba(127,232,216,.3); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\" style-hover=\"border-color: var(--acc,#35e0c8); background: rgba(53,224,200,.08); color: #fff;\">GITHUB<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/andy-ding-a5b352317/\" target=\"_blank\" rel=\"noopener\" style=\"padding: 9px 14px; border: 1px solid rgba(127,232,216,.3); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\" style-hover=\"border-color: var(--acc,#35e0c8); background: rgba(53,224,200,.08); color: #fff;\">LINKEDIN<\u002Fa>\n        <a href=\"https://mail.google.com/mail/?view=cm&amp;to=andyding09@gmail.com\" target=\"_blank\" rel=\"noopener\" style=\"padding: 9px 14px; border: 1px solid rgba(127,232,216,.3); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\" style-hover=\"border-color: var(--acc,#35e0c8); background: rgba(53,224,200,.08); color: #fff;\">EMAIL<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p style=\"margin: 0; font-size: 18px; line-height: 1.7; color: #cfe0e1;\">\n        I'm <strong style=\"color: #fff;\">Andy Ding<\u002Fstrong>, a 10th grader at Weston High School (Class of 2028) headed for <strong style=\"color: #fff;\">environmental engineering<\u002Fstrong>. I build hardware and software for environmental problems — right now, a boat that samples the ocean and an endoscope that maps bone.\n      <\u002Fp>\n      <p style=\"margin: 18px 0 0; font-size: 16px; line-height: 1.7; color: #9fbcc0;\">\n        <strong style=\"color: #cfe6e4;\">Project Kymarion<\u002Fstrong> is an ISEF project I co-develop with a partner: mapping nearshore microplastic concentrations with a low-cost autonomous surface vehicle along the Massachusetts coast. <strong style=\"color: #cfe6e4;\">LuminaBone<\u002Fstrong> is a medical-imaging project — a shading-based 3-D bone endoscope for orthopedic surgery. Beyond research I captain my FTC robotics team, compete in DECA and debate, swim varsity, and write about the work for public audiences. <a href=\"https://ethan-zhang.lightsdarke.workers.dev/research/\" target=\"_blank\" rel=\"noopener\">Co-researcher: Ethan Zhang ↗<\u002Fa>\n      <\u002Fp>\n      <div data-r=\"trio\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 30px;\">\n        <div style=\"border: 1px solid rgba(127,232,216,.16); border-radius: 4px; padding: 14px 16px; background: rgba(10,34,45,.5);\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .16em; color: #6f959c;\">SCHOOL<\u002Fdiv>\n          <div style=\"margin-top: 6px; font-size: 14px; color: #e8f1f2; line-height: 1.4;\">Weston High School — '28<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border: 1px solid rgba(127,232,216,.16); border-radius: 4px; padding: 14px 16px; background: rgba(10,34,45,.5);\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .16em; color: #6f959c;\">FOCUS<\u002Fdiv>\n          <div style=\"margin-top: 6px; font-size: 14px; color: #e8f1f2; line-height: 1.4;\">Autonomous systems &amp; microplastic detection<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border: 1px solid rgba(127,232,216,.16); border-radius: 4px; padding: 14px 16px; background: rgba(10,34,45,.5);\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .16em; color: #6f959c;\">BASE<\u002Fdiv>\n          <div style=\"margin-top: 6px; font-size: 14px; color: #e8f1f2; line-height: 1.4;\">Weston, Massachusetts<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 26px; display: flex; flex-direction: column; gap: 10px;\">\n        <div style=\"display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .14em; color: #6f959c; width: 84px;\">LANGUAGES<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(53,224,200,.1); border: 1px solid rgba(53,224,200,.25); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #a9ece0;\">Python<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(53,224,200,.1); border: 1px solid rgba(53,224,200,.25); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #a9ece0;\">C++<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(53,224,200,.1); border: 1px solid rgba(53,224,200,.25); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #a9ece0;\">Java<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(53,224,200,.1); border: 1px solid rgba(53,224,200,.25); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #a9ece0;\">JavaScript<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .14em; color: #6f959c; width: 84px;\">HARDWARE<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(255,180,84,.08); border: 1px solid rgba(255,180,84,.28); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #ffd39b;\">ESP32<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(255,180,84,.08); border: 1px solid rgba(255,180,84,.28); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #ffd39b;\">NEO-M8N GPS<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(255,180,84,.08); border: 1px solid rgba(255,180,84,.28); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #ffd39b;\">OV9281 Camera<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(255,180,84,.08); border: 1px solid rgba(255,180,84,.28); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #ffd39b;\">Digital Potentiometer<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .14em; color: #6f959c; width: 84px;\">TOOLS<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(127,232,216,.06); border: 1px solid rgba(127,232,216,.2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\">Git<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(127,232,216,.06); border: 1px solid rgba(127,232,216,.2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\">Linux<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(127,232,216,.06); border: 1px solid rgba(127,232,216,.2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\">LaTeX<\u002Fspan>\n          <span style=\"padding: 5px 11px; border-radius: 999px; background: rgba(127,232,216,.06); border: 1px solid rgba(127,232,216,.2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\">CAD<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ FIELD LOG ══ -->\n<section id=\"log\" data-screen-label=\"Field log\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 30px 28px 90px;\">\n  <a href=\"classic.html#blog\" style=\"display: block; border: 1px solid rgba(255,180,84,.3); border-radius: 6px; background: linear-gradient(180deg, rgba(255,180,84,.06), rgba(255,180,84,.02)); padding: 34px 36px; position: relative; overflow: hidden;\" style-hover=\"border-color: #ffb454; transform: translateY(-3px); box-shadow: 0 14px 40px rgba(0,0,0,.4); color: inherit;\">\n    <div style=\"display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;\">\n      <div>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: #ffb454;\">02 / FIELD LOG — JOURNAL<\u002Fdiv>\n        <div style=\"margin-top: 10px; font-family: 'Instrument Serif', serif; font-size: clamp(26px, 3.4vw, 38px); color: #f4ede0;\">Field notes from the build — <em style=\"color: #ffb454;\">read the log<\u002Fem><\u002Fdiv>\n        <div style=\"margin-top: 10px; font-size: 14px; color: #b9a98c; max-width: 560px; line-height: 1.6;\">Documenting Project Kymarion, ocean research, and whatever I'm learning right now. Comments are open on every post — I read all of them.<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #ffb454; white-space: nowrap;\">OPEN JOURNAL ↗<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fa>\n<\u002Fsection>\n\n<!-- ══ RESEARCH ══ -->\n<section id=\"research\" data-screen-label=\"Research\" data-r=\"pad\" data-reveal=\"\" style=\"max-width: 1060px; margin: 0 auto; padding: 40px 28px 90px;\">\n  <div style=\"display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px;\">\n    <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: var(--acc,#35e0c8);\">03 / RESEARCH<\u002Fspan>\n    <h2 style=\"margin: 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(38px, 5vw, 60px);\">Two <em style=\"color: var(--acc,#35e0c8);\">instruments<\u002Fem><\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"margin: 0 0 44px; color: #9fbcc0; max-width: 640px; line-height: 1.65;\">Independent research in environmental engineering, robotics, and ocean science. Both diagrams below are live — touch them.<\u002Fp>\n\n  <!-- KYMARION -->\n  <div style=\"border: 1px solid rgba(127,232,216,.2); border-radius: 8px; background: rgba(8,28,38,.6); overflow: hidden; margin-bottom: 34px;\">\n    <div data-r=\"split\" style=\"display: grid; grid-template-columns: 1fr 1.1fr; gap: 0;\">\n      <div style=\"padding: 38px 36px;\">\n        <div style=\"display: flex; gap: 10px; align-items: center; flex-wrap: wrap;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .12em; padding: 4px 10px; border-radius: 999px; background: rgba(53,224,200,.12); color: #7fe8d8; border: 1px solid rgba(53,224,200,.3);\">ONGOING · 2026–27<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .12em; color: #6f959c;\">ISEF · CO-INVESTIGATOR<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"margin: 18px 0 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 40px;\">Project <em style=\"color: var(--acc,#35e0c8);\">Kymarion<\u002Fem><\u002Fh3>\n        <p style=\"margin: 14px 0 0; color: #b9d2d4; line-height: 1.65; font-size: 15px;\">Do microplastics pile up where opposing coastal currents collide? We co-built a low-cost autonomous boat to find out — GPS-tagged sampling at 6 stations per deployment: 3 suspected convergence zones against 3 distance-matched controls.<\u002Fp>\n        <ul style=\"margin: 18px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: #8fb4ba;\">\n          <li style=\"display: flex; gap: 10px;\"><span style=\"color: var(--acc,#35e0c8);\">◆<\u002Fspan>Autonomous surface vehicle — ESP32 + NEO-M8N GPS<\u002Fli>\n          <li style=\"display: flex; gap: 10px;\"><span style=\"color: var(--acc,#35e0c8);\">◆<\u002Fspan>6 stations · 3 matched pairs · multiple tidal states<\u002Fli>\n          <li style=\"display: flex; gap: 10px;\"><span style=\"color: var(--acc,#35e0c8);\">◆<\u002Fspan>ANOVA + regression against convergence strength<\u002Fli>\n        <\u002Ful>\n        <a href=\"kymarion.html\" style=\"display: inline-flex; margin-top: 24px; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--acc,#35e0c8); border-bottom: 1px solid rgba(53,224,200,.4); padding-bottom: 3px;\" style-hover=\"color: #fff; border-color: #fff;\">READ THE CASE STUDY ↗<\u002Fa>\n      <\u002Fdiv>\n      <div data-rp=\"l\" style=\"border-left: 1px solid rgba(127,232,216,.14); background: #061a24; padding: 26px 26px 20px; display: flex; flex-direction: column;\">\n        <div style=\"display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .16em; color: #5c828a; margin-bottom: 12px;\">\n          <span>TRANSECT SCHEMATIC — HOVER A STATION<\u002Fspan><span>NOT TO SCALE<\u002Fspan>\n        <\u002Fdiv>\n        <svg sc-camel-view-box=\"0 0 460 240\" style=\"width: 100%; height: auto; display: block;\">\n          <defs>\n            <marker id=\"omArr\" sc-camel-view-box=\"0 0 8 8\" sc-camel-ref-x=\"7\" sc-camel-ref-y=\"4\" sc-camel-marker-width=\"6\" sc-camel-marker-height=\"6\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 Z\" fill=\"#ffb454\"><\u002Fpath><\u002Fmarker>\n          <\u002Fdefs>\n          <path d=\"M0 36 Q 80 12 160 30 T 320 26 T 460 40 L 460 0 L 0 0 Z\" fill=\"#0d2f3c\"><\u002Fpath>\n          <path d=\"M0 36 Q 80 12 160 30 T 320 26 T 460 40\" stroke=\"rgba(255,180,84,.5)\" stroke-width=\"1.5\" fill=\"none\"><\u002Fpath>\n          <text x=\"10\" y=\"20\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" fill=\"#7fa8ae\" letter-spacing=\"2\">SHORE<\u002Ftext>\n          <g stroke=\"rgba(127,232,216,.12)\" stroke-width=\"1\"><line x1=\"0\" y1=\"90\" x2=\"460\" y2=\"90\"><\u002Fline><line x1=\"0\" y1=\"150\" x2=\"460\" y2=\"150\"><\u002Fline><line x1=\"0\" y1=\"210\" x2=\"460\" y2=\"210\"><\u002Fline><\u002Fg>\n          <g font-family=\"IBM Plex Mono, monospace\" font-size=\"8\" fill=\"#41626b\"><text x=\"6\" y=\"86\">-5m<\u002Ftext><text x=\"6\" y=\"146\">-10m<\u002Ftext><text x=\"6\" y=\"206\">-15m<\u002Ftext><\u002Fg>\n          <line x1=\"66\" y1=\"120\" x2=\"128\" y2=\"120\" stroke=\"#ffb454\" stroke-width=\"1.6\" marker-end=\"url(#omArr)\" stroke-dasharray=\"6 4\" style=\"animation: omDash 1.2s linear infinite;\"><\u002Fline>\n          <line x1=\"222\" y1=\"120\" x2=\"160\" y2=\"120\" stroke=\"#ffb454\" stroke-width=\"1.6\" marker-end=\"url(#omArr)\" stroke-dasharray=\"6 4\" style=\"animation: omDash 1.2s linear infinite;\"><\u002Fline>\n          <line x1=\"240\" y1=\"176\" x2=\"300\" y2=\"176\" stroke=\"#ffb454\" stroke-width=\"1.6\" marker-end=\"url(#omArr)\" stroke-dasharray=\"6 4\" style=\"animation: omDash 1.4s linear infinite;\"><\u002Fline>\n          <line x1=\"392\" y1=\"176\" x2=\"332\" y2=\"176\" stroke=\"#ffb454\" stroke-width=\"1.6\" marker-end=\"url(#omArr)\" stroke-dasharray=\"6 4\" style=\"animation: omDash 1.4s linear infinite;\"><\u002Fline>\n          <path d=\"M20 200 C 90 150, 140 105, 144 118 C 150 132, 200 190, 316 176 C 380 168, 420 120, 446 96\" stroke=\"rgba(53,224,200,.45)\" stroke-width=\"1.4\" fill=\"none\" stroke-dasharray=\"3 5\" style=\"animation: omDash 2s linear infinite;\"><\u002Fpath>\n          <sc-for list=\"{{ stations }}\" as=\"st\" hint-placeholder-count=\"6\">\n            <g sc-camel-on-mouse-enter=\"{{ st.select }}\" style=\"cursor: pointer;\">\n              <circle cx=\"{{ st.x }}\" cy=\"{{ st.y }}\" r=\"14\" fill=\"transparent\"><\u002Fcircle>\n              <circle cx=\"{{ st.x }}\" cy=\"{{ st.y }}\" r=\"{{ st.haloR }}\" fill=\"{{ st.halo }}\"><\u002Fcircle>\n              <circle cx=\"{{ st.x }}\" cy=\"{{ st.y }}\" r=\"5\" fill=\"{{ st.fill }}\" stroke=\"#04121a\" stroke-width=\"1.5\"><\u002Fcircle>\n              <text x=\"{{ st.x }}\" y=\"{{ st.labelY }}\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"9\" fill=\"{{ st.labelFill }}\">{{ st.id }}<\u002Ftext>\n            <\u002Fg>\n          <\u002Fsc-for>\n        <\u002Fsvg>\n        <div style=\"margin-top: auto; border: 1px solid rgba(127,232,216,.18); border-radius: 4px; background: rgba(4,18,26,.7); padding: 12px 16px; min-height: 58px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; display: flex; align-items: center; justify-content: space-between; gap: 14px;\">\n          <div>\n            <div style=\"color: #e8f1f2; font-weight: 600;\">{{ activeStation.title }}<\u002Fdiv>\n            <div style=\"color: #7fa8ae; margin-top: 3px;\">{{ activeStation.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"padding: 4px 10px; border-radius: 999px; font-size: 10px; letter-spacing: .1em; white-space: nowrap; border: 1px solid; color: {{ activeStation.tagColor }}; border-color: {{ activeStation.tagColor }};\">{{ activeStation.tag }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- LUMINABONE -->\n  <div style=\"border: 1px solid rgba(127,232,216,.2); border-radius: 8px; background: rgba(8,28,38,.6); overflow: hidden;\">\n    <div data-r=\"split\" style=\"display: grid; grid-template-columns: 1.1fr 1fr;\">\n      <div data-rp=\"r\" style=\"border-right: 1px solid rgba(127,232,216,.14); background: #050f16; padding: 26px 26px 20px; display: flex; flex-direction: column; gap: 12px;\">\n        <div style=\"display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .16em; color: #5c828a;\">\n          <span>NEAR-LIGHT SHADING DEMO — MOVE YOUR CURSOR<\u002Fspan><span ref=\"{{ lumaReadoutRef }}\">θ 0° · φ 0°<\u002Fspan>\n        <\u002Fdiv>\n        <canvas ref=\"{{ lumaCanvasRef }}\" style=\"width: 100%; aspect-ratio: 3 / 2; display: block; border-radius: 4px; cursor: none; background: #02080c;\"><\u002Fcanvas>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #41626b; letter-spacing: .08em;\">SIMULATION: one moving light + shading → surface shape. The real device does this inside a 6&nbsp;mm tube.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding: 38px 36px;\">\n        <div style=\"display: flex; gap: 10px; align-items: center; flex-wrap: wrap;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .12em; padding: 4px 10px; border-radius: 999px; background: rgba(255,180,84,.1); color: #ffd39b; border: 1px solid rgba(255,180,84,.3);\">ONGOING · SUMMER 2026<\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: .12em; color: #6f959c;\">MEDICAL IMAGING INTERNSHIP<\u002Fspan>\n        <\u002Fdiv>\n        <h3 style=\"margin: 18px 0 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 40px;\">Lumina<em style=\"color: #ffb454;\">Bone<\u002Fem><\u002Fh3>\n        <p style=\"margin: 14px 0 0; color: #b9d2d4; line-height: 1.65; font-size: 15px;\">A 6&nbsp;mm endoscope that rebuilds 3-D bone surfaces from moving light — no dye, no stereo cameras. Near-light photometric stereo turns shading changes into surface normals, live during surgery.<\u002Fp>\n        <ul style=\"margin: 18px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: #8fb4ba;\">\n          <li style=\"display: flex; gap: 10px;\"><span style=\"color: #ffb454;\">◆<\u002Fspan>Near-light photometric stereo<\u002Fli>\n          <li style=\"display: flex; gap: 10px;\"><span style=\"color: #ffb454;\">◆<\u002Fspan>Target ≥ 15 fps reconstruction<\u002Fli>\n          <li style=\"display: flex; gap: 10px;\"><span style=\"color: #ffb454;\">◆<\u002Fspan>Orthopedic &amp; ENT applications<\u002Fli>\n        <\u002Ful>\n        <a href=\"luminabone.html\" style=\"display: inline-flex; margin-top: 24px; align-items: center; gap: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #ffb454; border-bottom: 1px solid rgba(255,180,84,.4); padding-bottom: 3px;\" style-hover=\"color: #fff; border-color: #fff;\">READ THE CASE STUDY ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PAPERS -->\n  <div data-r=\"split\" style=\"margin-top: 34px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n    <div style=\"border: 1px dashed rgba(127,232,216,.28); border-radius: 6px; padding: 20px 22px;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .18em; color: var(--acc,#35e0c8);\">PAPER IN PROGRESS · DRAFT · 2025–2026<\u002Fdiv>\n      <div style=\"margin-top: 8px; font-size: 15px; line-height: 1.5; color: #dcebeb;\">Nearshore Microplastic Accumulation at Current-Convergence Zones: A Low-Cost ASV Mapping Study<\u002Fdiv>\n      <div style=\"margin-top: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #6f959c;\">Andy S. Ding, Co-investigator — ISEF research paper<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border: 1px dashed rgba(255,180,84,.3); border-radius: 6px; padding: 20px 22px;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .18em; color: #ffb454;\">PAPER IN PROGRESS · PROPOSAL · SUMMER 2026<\u002Fdiv>\n      <div style=\"margin-top: 8px; font-size: 15px; line-height: 1.5; color: #dcebeb;\">LuminaBone: A Low-Cost Shading-Based 3D Bone Endoscope Using Near-Light Photometric Stereo<\u002Fdiv>\n      <div style=\"margin-top: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #6f959c;\">Andy S. Ding — medical imaging internship report<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ RÉSUMÉ ══ -->\n<section id=\"resume\" data-screen-label=\"Resume\" data-reveal=\"\" style=\"border-top: 1px solid rgba(127,232,216,.12); background: rgba(6,22,31,.55);\">\n  <div data-r=\"pad\" style=\"max-width: 1060px; margin: 0 auto; padding: 100px 28px;\">\n    <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 50px;\">\n      <div style=\"display: flex; align-items: baseline; gap: 16px;\">\n        <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .2em; color: var(--acc,#35e0c8);\">04 / CREDENTIALS<\u002Fspan>\n        <h2 style=\"margin: 0; font-family: 'Instrument Serif', serif; font-weight: 400; font-size: clamp(38px, 5vw, 60px);\">The <em style=\"color: var(--acc,#35e0c8);\">core sample<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <a href=\"https://andysding.com/resume.pdf\" target=\"_blank\" rel=\"noopener\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 16px; border: 1px solid rgba(127,232,216,.35); border-radius: 3px; color: #cfe6e4;\" style-hover=\"border-color: var(--acc,#35e0c8); background: rgba(53,224,200,.08); color: #fff;\">DOWNLOAD PDF · JUNE 2026<\u002Fa>\n    <\u002Fdiv>\n    <div data-r=\"split\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 60px;\">\n      <div style=\"display: flex; flex-direction: column; gap: 0;\">\n        <div style=\"font-family: 'IBM Plex Mono', mon ic.html#stocks\" style=\"color: var(--acc,#35e0c8);\" style-hover=\"color: #fff;\">$ open live-desk ↗<\u002Fa><span style=\"display: inline-block; width: 9px; height: 17px; background: var(--acc,#35e0c8); vertical-align: text-bottom; margin-left: 6px; animation: omBlink 1.1s step-end infinite;\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══ FOOTER ══ -->\n<footer data-screen-label=\"Footer\" style=\"border-top: 1px solid rgba(127,232,216,.12);\">\n  <div data-r=\"pad\" style=\"max-width: 1060px; margin: 0 auto; padding: 70px 28px 60px; display: flex; flex-direction: column; gap: 30px;\">\n    <div style=\"display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; flex-wrap: wrap;\">\n      <div>\n        <div style=\"font-family: 'Instrument Serif', serif; font-size: clamp(30px, 4vw, 44px);\">Surface when there's <em style=\"color: var(--acc,#35e0c8);\">data.<\u002Fem><\u002Fdiv>\n        <div style=\"margin-top: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #6f959c;\">END OF TRANSECT · RESURFACING<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 10px;\">\n        <a href=\"https://github.com/andyding09\" target=\"_blank\" rel=\"noopener\" style=\"padding: 10px 16px; border: 1px solid rgba(127,232,216,.3); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\" style-hover=\"border-color: var(--acc,#35e0c8); background: rgba(53,224,200,.08); color: #fff;\">GITHUB<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/andy-ding-a5b352317/\" target=\"_blank\" rel=\"noopener\" style=\"padding: 10px 16px; border: 1px solid rgba(127,232,216,.3); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\" style-hover=\"border-color: var(--acc,#35e0c8); background: rgba(53,224,200,.08); color: #fff;\">LINKEDIN<\u002Fa>\n        <a href=\"https://mail.google.com/mail/?view=cm&amp;to=andyding09@gmail.com\" target=\"_blank\" rel=\"noopener\" style=\"padding: 10px 16px; border: 1px solid rgba(127,232,216,.3); border-radius: 3px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #cfe6e4;\" style-hover=\"border-color: var(--acc,#35e0c8); background: rgba(53,224,200,.08); color: #fff;\">EMAIL<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; border-top: 1px solid rgba(127,232,216,.1); padding-top: 22px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #5c828a;\">\n      <span>© 2026 ANDY S. DING<\u002Fspan>\n      <span>BUILT FOR THE MASSACHUSETTS COAST · 42.36°N 71.26°W<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#35e0c8&quot;, &quot;options&quot;: [&quot;#35e0c8&quot;, &quot;#55c8ff&quot;, &quot;#8affc1&quot;, &quot;#ffb454&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Theme&quot;}, &quot;particles&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 170, &quot;min&quot;: 0, &quot;max&quot;: 320, &quot;step&quot;: 10, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Hero simulation&quot;}, &quot;motion&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Hero simulation&quot;}}\">\nclass Component extends DCLogic {\n  state = { activeIdx: 0 };\n  rootRef = React.createRef();\n  heroCanvasRef = React.createRef();\n  lumaCanvasRef = React.createRef();\n  lumaReadoutRef = React.createRef();\n  depthBarRef = React.createRef();\n  depthNumRef = React.createRef();\n\n  stationData = [\n    { id: 'C1', x: 144, y: 118, kind: 'conv', pair: 'A' },\n    { id: 'K1', x: 88, y: 158, kind: 'ctr }, { fx: .9, fy: .7, v: '13.0' }, { fx: .15, fy: .86, v: '15.7' }, { fx: .72, fy: .16, v: '6.9' },\n    ];\n    c.addEventListener('pointermove', (e) => {\n      const r = c.getBoundingClientRect();\n      this.pointer = { x: (e.clientX - r.left) * this.heroDpr, y: (e.clientY - r.top) * this.heroDpr };\n    });\n    c.addEventListener('pointerleave', () => { this.pointer = { x: -9999, y: -9999 }; });\n    let t = 0;\n    const acc = () => this.props.accent ?? '#35e0c8';\n    const loop = () => {\n      this.heroRaf = requestAnimationFrame(loop);\n      const w = c.width, h = c.height, ctx = c.getContext('2d');\n      t += 0.006;\n      ctx.fillStyle = '#04121a';\n      ctx.fillRect(0, 0, w, h);\n      // sounding grid\n      ctx.strokeStyle = 'rgba(127,232,216,.05)';\n      ctx.lineWidth = 1;\n      const step = 90 * this.heroDpr;\n      ctx.beginPath();\n      for (let x = step; x < w; x += step) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }\n      for (let y = step; y < h; y += step) { ctx.moveTo(0, y); ctx.lineTo(w, y); }\n      ctx.stroke();\n      // soundings\n      ctx.fillStyle = 'rgba(127,168,174,.14)';\n      ctx.font = (10 * this.heroDpr) + 'px IBM Plex Mono, monospace';\n      for (const s of this.soundings) ctx.fillText(s.v, s.fx * w, s.fy * h);\n      // convergence bands\n      const bands = [0.34 * w, 0.74 * w];\n      for (const bx of bands) {\n        const g = ctx.createLinearGradient(bx - 60 * this.heroDpr, 0, bx + 60 * this.heroDpr, 0);\n        g.addColorStop(0, 'rgba(53,224,200,0)');\n        g.addColorStop(.5, 'rgba(53,224,200,.055)');\n        g.addColorStop(1, 'rgba(53,224,200,0)');\n        ctx.fillStyle = g;\n        ctx.fillRect(bx - 60 * this.heroDpr, 0, 120 * this.heroDpr, h);\n        ctx.setLineDash([4 * this.heroDpr, 7 * this.heroDpr]);\n        ctx.strokeStyle = 'rgba(53,224,200,.16)';\n        ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, h); ctx.stroke();\n        ctx.setLineDash([]);\n      }\n      const frozen = this.motionOff y = (e.clientY - r.top) * this.heroDpr;\n    this.rings.push({ x, y, r: 6, a: 0.7 });\n    this.rings.push({ x, y, r: 1, a: 0.9 });\n    for (const p of this.parts) {\n      const dx = p.x - x, dy = p.y - y, d = Math.sqrt(dx * dx + dy * dy) || 1;\n      if (d < 260 * this.heroDpr) { const f = (1 - d / (260 * this.heroDpr)) * 9 * this.heroDpr; p.vx += (dx / d) * f; p.vy += (dy / d) * f; }\n    }\n  }\n\n  // ---------- LUMINABONE: near-light photometric shading ----------\n  initLuma() {\n    const c = this.lumaCanvasRef.current; if (!c) return;\n    const W = 168, H = 112;\n    c.width = W; c.height = H;\n    // height field: bone shaft + condyle bumps\n    const Hf = new Float32Array(W * H);\n    const bump = (cx, cy, s, a) => {\n      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {\n        const dx = (x - cx) / s, dy = (y - cy) / s;\n        Hf[y * W + x] += a * Math.exp(-(dx * dx + dy * dy));\n      }\n    };\n    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {\n      const dy = (y - H * 0.52) / (H * 0.16);\n      Hf[y * W + x] = 16 * Math.exp(-dy * dy) * (0.75 + 0.25 * Math.sin(x * 0.05));\n    }\n    bump(28, 42, 15, 13); bump(24, 68, 13, 11); bump(146, 46, 14, 12); bump(142, 72, 12, 10);\n    bump(70, 55, 9, -4.5); bump(104, 62, 7, 3.5); bump(88, 48, 5, -2.5);\n    // normals\n    const Nx = new Float32Array(W * H), Ny = new Float32Array(W * H), Nz = new Float32Array(W * H);\n    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {\n      const i = y * W + x;\n      const hl = Hf[y * W + Math.max(0, x - 1)], hr = Hf[y * W + Math.min(W - 1, x + 1)];\n      const hu = Hf[Math.max(0, y - 1) * W + x], hd = Hf[Math.min(H - 1, y + 1) * W + x];\n      let nx = (hl - hr), ny = (hu - hd), nz = 2.4;\n      const l = Math.sqrt(nx * nx + ny * ny + nz * nz);\n      Nx[i] = nx / l; Ny[i] = ny / l; Nz[i] = nz / l;\n    }\n    this.luma = { c, W, H, Hf, Nx, Ny, Nz, lx: W * .3, ly: H * .3, idle: true, t: 0 };\n    const img = c.getContext('2d').create light marker\n    ctx.beginPath(); ctx.arc(L.lx, L.ly, 2.4, 0, Math.PI * 2);\n    ctx.fillStyle = '#ffb454'; ctx.fill();\n    ctx.beginPath(); ctx.arc(L.lx, L.ly, 5.5, 0, Math.PI * 2);\n    ctx.strokeStyle = 'rgba(255,180,84,.6)'; ctx.lineWidth = .8; ctx.stroke();\n    if (this.lumaReadoutRef.current) {\n      const th = Math.round(Math.atan2(L.ly - H / 2, L.lx - W / 2) * 180 / Math.PI);\n      const ph = Math.round(Math.sqrt((L.lx - W / 2) ** 2 + (L.ly - H / 2) ** 2) / W * 100);\n      this.lumaReadoutRef.current.textContent = 'LIGHT θ ' + th + '° · r ' + ph;\n    }\n  }\n\n  initReveal() {\n    const root = this.rootRef.current;\n    if (!root || this.reduced || !('IntersectionObserver' in window)) return;\n    const els = Array.from(root.querySelectorAll('[data-reveal]'));\n    els.forEach(el => {\n      if (el.getBoundingClientRect().top > window.innerHeight * 0.9) {\n        el.style.opacity = '0'; el.style.transform = 'translateY(26px)';\n        el.style.transition = 'opacity .7s ease, transform .7s ease';\n      }\n    });\n    this.revealIO = new IntersectionObserver((entries) => {\n      for (const en of entries) if (en.isIntersecting) {\n        en.target.style.opacity = '1'; en.target.style.transform = 'none';\n        this.revealIO.unobserve(en.target);\n      }\n    }, { threshold: 0.08 });\n    els.forEach(el => this.revealIO.observe(el));\n    setTimeout(() => els.forEach(el => { el.style.opacity = '1'; el.style.transform = 'none'; }), 5000);\n  }\n\n  initNavSpy() {\n    const root = this.rootRef.current;\n    if (!root || !('IntersectionObserver' in window)) return;\n    const map = {};\n    root.querySelectorAll('nav a[href^=\"#\"]').forEach(a => {\n      const id = a.getAttribute('href').slice(1);\n      if (id && id !== 'home') map[id] = a;\n    });\n    this.spyIO = new IntersectionObserver((entries) => {\n      for (const en of entries) {\n        const a = map[en.target.id]; if (!a) continue;\n        if (en.isIntersecting) { a.style.color =
